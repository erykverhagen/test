<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dead Wax</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head>
<body>
<section id="authShell" class="auth-shell">
  <div class="auth-card"><div class="mark">DW</div><h1>Dead Wax</h1><div class="tag">A private vinyl archive</div>
    <div class="auth-tabs"><button type="button" id="tabSignIn" class="auth-tab on">Sign in</button><button type="button" id="tabSignUp" class="auth-tab">Sign up</button></div>
    <form id="authForm"><div class="field"><label>Email</label><input id="authEmail" type="email" autocomplete="email" required></div><div class="field"><label>Password</label><input id="authPassword" type="password" autocomplete="current-password" required></div><button type="submit" id="authSubmit" class="btn primary" style="width:100%">Sign in</button></form>
    <p class="msg" id="authMsg"></p><p class="notice">Email/password is temporary for the test build. Google/Apple or magic link can replace this later without changing the database.</p>
  </div>
</section>
<section id="appShell" class="hidden">
<header class="app-header"><div class="topbar"><div class="brand"><div class="brand-disc"></div><div><div class="brand-main">Dead Wax</div><div class="brand-sub">A vinyl collection</div></div></div><div class="search"><input id="searchInput" placeholder="Search artist, album, Shelf ID"></div><div class="top-actions"><a class="btn small ghost" href="importer.html">Import DB</a><button type="button" id="addRecordBtn" class="btn small primary">Add record</button></div><div class="userbox"><span id="userEmail"></span><button type="button" id="signOutBtn" class="btn small">Sign out</button></div></div>
  <div class="filters"><div class="fg"><label>Collection</label><select id="collectionFilter"><option value="">All collections</option></select></div><div class="fg"><label>Genre</label><select id="genreFilter"><option value="">All genres</option></select></div><div class="fg"><label>Reaction</label><select id="reactionFilter"><option value="">All reactions</option><option value="liked">Liked</option><option value="neutral">Neutral</option><option value="disliked">Disliked</option></select></div><div class="fg"><label>Listened</label><label class="check-wrap"><input id="listenedFilter" type="checkbox">Listened</label></div><div class="fg"><label>Doubles</label><label class="check-wrap"><input id="doublesFilter" type="checkbox">Copies &gt; 1</label></div><div class="fg"><label>Grail Only</label><label class="check-wrap"><input id="grailFilter" type="checkbox">Grail</label></div></div>
</header>
<main class="main"><div class="stats"><span><strong id="shownCount">0</strong> shown</span><span><strong id="totalCount">0</strong> total</span><span id="syncMsg"></span></div><div id="grid" class="grid"></div><div id="emptyState" class="empty hidden">No records found. Import your DB or add a record.</div></main>
</section>
<div id="modal" class="modal hidden"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="app.js"></script>
</body></html>
