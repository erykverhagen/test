<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dead Wax Importer</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><main class="auth-shell"><div class="auth-card" style="width:min(720px,100%)"><div class="mark">DW</div><h1>Dead Wax Importer</h1><div class="tag">One-time DB V4 import into Supabase</div><p class="notice">This page reads a local <code>dead_wax_db.js</code> file from your browser and imports it into your signed-in Supabase account. The DB file is not included in the public app.</p><div id="authBox"><div class="field"><label>Email</label><input id="email" type="email"></div><div class="field"><label>Password</label><input id="password" type="password"></div><button type="button" id="signin" class="btn primary">Sign in</button></div><div id="importBox" class="hidden"><p class="notice">Signed in as <span id="who"></span>. Choose your local DB file.</p><div class="field"><label>dead_wax_db.js</label><input id="dbFile" type="file" accept=".js,.txt"></div><button type="button" id="importBtn" class="btn primary">Import DB</button><a class="btn" href="index.html">Back to app</a></div><p id="log" class="msg"></p><pre id="details" style="white-space:pre-wrap;color:var(--mt);font-size:.75rem;max-height:260px;overflow:auto"></pre></div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="importer.js"></script></body></html>
